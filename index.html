// ── Loan Tab ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function LoanTab() {
  const [loans, setLoans] = useLS("azfin_loans", []);
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const emptyForm = {ten:"",loai:"vayTieuDung",soTienVay:"",laiSuat:"",soKy:"",kyDaTra:"0",ngayBatDau:"",ngayTraHangThang:"",soTienTraHangThang:"",nganHang:"",ghiChu:""};
  const [form, setForm] = useState(emptyForm);

  const LOAN_TYPES = [
    {id:"vayTieuDung",l:"💰 Vay tiêu dùng",c:"#f59e0b"},
    {id:"muaNha",     l:"🏠 Vay mua nhà",  c:"#3b82f6"},
    {id:"muaXe",      l:"🚗 Vay mua xe",   c:"#10b981"},
    {id:"khac",       l:"📦 Khác",         c:"#64748b"},
  ];
  const getType = id => LOAN_TYPES.find(t=>t.id===id) || LOAN_TYPES[3];

  const calcEMI = (P, laiSuat, n) => {
    if (!P || !n) return 0;
    const r = laiSuat/100/12;
    if (r === 0) return P/n;
    return P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
  };
  const calcRemaining = (P, laiSuat, n, paid) => {
    const r = laiSuat/100/12;
    if (r === 0) return P*(1-paid/n);
    const emi = calcEMI(P,laiSuat,n);
    return Math.max(0, P*Math.pow(1+r,paid) - emi*(Math.pow(1+r,paid)-1)/r);
  };

  const getLoanPeriod = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  };
  const isPaidLoan = loan => {
    const period = getLoanPeriod();
    if (loan.paidPeriod !== period) return false;
    if (!loan.ngayTraHangThang) return true;
    // Check 7 days before NEXT period's payment (not current month's)
    const [y, m] = period.split('-').map(Number);
    let nextM = m + 1, nextY = y;
    if (nextM > 12) { nextM = 1; nextY++; }
    const day = parseInt(loan.ngayTraHangThang);
    const lastDay = new Date(nextY, nextM, 0).getDate();
    const nextPeriodDate = new Date(nextY, nextM - 1, Math.min(day, lastDay));
    const du = daysUntil(nextPeriodDate);
    return du === null || du > 7;
  };

  const getNextPaymentDate = loan => {
    if (!loan.ngayTraHangThang) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const day = parseInt(loan.ngayTraHangThang);
    let year = today.getFullYear(), month = today.getMonth();
    if (today.getDate() >= day) {
      month += 1;
      if (month > 11) { month = 0; year += 1; }
    }
    const lastDay = new Date(year, month+1, 0).getDate();
    return new Date(year, month, Math.min(day, lastDay));
  };
  const getNextPeriodPaymentDate = loan => {
    if (!loan.ngayTraHangThang) return null;
    const period = getLoanPeriod();
    const [y, m] = period.split('-').map(Number);
    let nextM = m + 1, nextY = y;
    if (nextM > 12) { nextM = 1; nextY++; }
    const day = parseInt(loan.ngayTraHangThang);
    const lastDay = new Date(nextY, nextM, 0).getDate();
    return new Date(nextY, nextM - 1, Math.min(day, lastDay));
  };
  const fDate = d => d ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` : null;
  const daysUntil = d => { if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/(864e5)); };

  const openAdd  = () => { setEditItem(null); setForm(emptyForm); setShowModal(true); };
  const openEdit = l => { setEditItem(l); setForm({...l,soTienVay:String(l.soTienVay),laiSuat:String(l.laiSuat),soKy:String(l.soKy),kyDaTra:String(l.kyDaTra),ngayTraHangThang:String(l.ngayTraHangThang||""),soTienTraHangThang:String(l.soTienTraHangThang||"")}); setShowModal(true); };
  const save = () => {
    if (!form.ten || !form.soTienVay || !form.soKy) return;
    const item = {id:editItem?.id||Date.now(), ten:form.ten.trim(), loai:form.loai, soTienVay:parseFloat(form.soTienVay)||0, laiSuat:parseFloat(form.laiSuat)||0, soKy:parseInt(form.soKy)||1, kyDaTra:parseInt(form.kyDaTra)||0, ngayBatDau:form.ngayBatDau, ngayTraHangThang:parseInt(form.ngayTraHangThang)||0, soTienTraHangThang:parseFloat(form.soTienTraHangThang)||0, nganHang:form.nganHang.trim(), ghiChu:form.ghiChu.trim(), paidPeriod:editItem?.paidPeriod||""};
    if (editItem) setLoans(loans.map(l=>l.id===editItem.id?item:l));
    else setLoans([...loans, item]);
    setShowModal(false);
  };
  const del = id => setLoans(loans.filter(l=>l.id!==id));
  const markPaid = loan => {
    if (loan.kyDaTra >= loan.soKy) return;
    setLoans(loans.map(l=>l.id===loan.id?{...l,kyDaTra:l.kyDaTra+1,paidPeriod:getLoanPeriod()}:l));
  };
  const undoPayment = loan => {
    setLoans(loans.map(l=>l.id===loan.id?{...l,kyDaTra:Math.max(0,l.kyDaTra-1),paidPeriod:""}:l));
  };

  const fVND = n => n>=1e9?(n/1e9).toFixed(2)+"tỷ":n>=1e6?(n/1e6).toFixed(1)+"tr":Math.round(n).toLocaleString("vi-VN")+"đ";
  const activeLoans    = loans.filter(l=>l.kyDaTra<l.soKy);
  const completedLoans = loans.filter(l=>l.kyDaTra>=l.soKy);
  const unpaidLoans    = activeLoans.filter(l=>!isPaidLoan(l));
  const paidThisMonth  = activeLoans.filter(l=>isPaidLoan(l));
  const totalRemaining = activeLoans.reduce((s,l)=>s+calcRemaining(l.soTienVay,l.laiSuat,l.soKy,l.kyDaTra),0);
  const totalMonthly   = activeLoans.reduce((s,l)=>s+calcEMI(l.soTienVay,l.laiSuat,l.soKy),0);

  const renderLoanCard = (loan, compact) => {
    const emi = loan.soTienTraHangThang || calcEMI(loan.soTienVay,loan.laiSuat,loan.soKy);
    const remaining = calcRemaining(loan.soTienVay,loan.laiSuat,loan.soKy,loan.kyDaTra);
    const pct = loan.soKy>0?loan.kyDaTra/loan.soKy*100:0;
    const t = getType(loan.loai);
    const nextDate = getNextPaymentDate(loan);
    const du = daysUntil(nextDate);
    const nextStr = fDate(nextDate);

    if (compact) {
      const nextPeriodDate = getNextPeriodPaymentDate(loan);
      const nextPeriodStr  = fDate(nextPeriodDate);
      const duNext         = daysUntil(nextPeriodDate);
      return (
        <div key={loan.id} style={{background:"#071a0f",borderRadius:10,padding:"12px 16px",border:"1px solid #166534",borderLeft:`4px solid ${t.c}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
              <span style={{fontSize:13,color:"#cbd5e1",fontWeight:600}}>{loan.ten}</span>
              <span style={{background:"#166534",color:"#4ade80",border:"1px solid #4ade80",borderRadius:12,padding:"1px 8px",fontSize:10,fontWeight:700}}>✅ Đã thanh toán</span>
            </div>
            <div style={{fontSize:11,color:"#475569"}}>
              {t.l}{loan.nganHang?` · ${loan.nganHang}`:""} · Kỳ {loan.kyDaTra}/{loan.soKy}
              {nextPeriodStr && <span style={{marginLeft:8}}>· Kỳ sau: {nextPeriodStr}{duNext!==null?` (${duNext}n)`:""}</span>}
            </div>
          </div>
          <span style={{fontSize:11,color:"#f87171",fontWeight:600}}>{fVND(remaining)}</span>
          <button onClick={()=>undoPayment(loan)} style={{background:"#0f172a",border:"1px solid #334155",color:"#f59e0b",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:10}} title="Hoàn tác thanh toán">↩</button>
          <button onClick={()=>openEdit(loan)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13}}>✎</button>
          <button onClick={()=>del(loan.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16}}>×</button>
        </div>
      );
    }

    let dueBg="#1e293b", dueColor="#64748b";
    if (du !== null) { if (du<=0){dueBg="#450a0a";dueColor="#f87171";}else if(du<=3){dueBg="#451a03";dueColor="#fbbf24";}else if(du<=7){dueBg="#1c1917";dueColor="#fbbf24";} }

    return (
      <div key={loan.id} style={{background:"#1e293b",borderRadius:12,padding:"16px 20px",borderLeft:`4px solid ${t.c}`}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10,gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,color:"#e2e8f0"}}>{loan.ten}</div>
            <div style={{fontSize:11,color:"#475569",marginTop:2}}>
              {t.l}{loan.nganHang?` · ${loan.nganHang}`:""}{loan.laiSuat>0?` · ${loan.laiSuat}%/năm`:" · 0% lãi suất"}
            </div>
            {nextStr && (
              <div style={{marginTop:5}}>
                <span style={{background:dueBg,border:`1px solid ${dueColor}`,color:dueColor,borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:600}}>
                  📅 Trả ngày {nextStr}{du!==null?` (${du<=0?"hôm nay":du===1?"ngày mai":du+"n"})` :""}
                </span>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
            <button onClick={()=>markPaid(loan)}
              style={{background:"#166534",border:"1px solid #4ade80",color:"#4ade80",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>
              ✓ Trả kỳ {loan.kyDaTra+1}
            </button>
            <button onClick={()=>openEdit(loan)} style={{background:"#0f172a",border:"1px solid #334155",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11}}>Sửa</button>
            <button onClick={()=>del(loan.id)} style={{background:"#0f172a",border:"1px solid #334155",color:"#f87171",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11}}>Xóa</button>
          </div>
        </div>
        <div style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>Kỳ {loan.kyDaTra}/{loan.soKy} · {fVND(emi)}/tháng</span>
            <span style={{fontSize:11,color:"#f87171",fontWeight:700}}>Còn: {fVND(remaining)}</span>
          </div>
          <div style={{height:8,background:"#0f172a",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:t.c,borderRadius:4,transition:"width 0.3s"}}/>
          </div>
          <div style={{marginTop:4,display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569"}}>
            <span>Đã trả: {fVND(loan.soTienVay-remaining)}</span>
            <span>{pct.toFixed(0)}% hoàn thành</span>
          </div>
        </div>
        {loan.ngayBatDau && <div style={{fontSize:10,color:"#334155"}}>Từ {loan.ngayBatDau}</div>}
        {loan.ghiChu && <div style={{fontSize:10,color:"#475569",marginTop:2}}>{loan.ghiChu}</div>}
      </div>
    );
  };

  return (
    <div>
      <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:16,color:"#38bdf8"}}>🏦 Quản lý khoản vay</span>
        <button onClick={openAdd} style={{marginLeft:"auto",padding:"7px 16px",borderRadius:20,border:"none",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Thêm khoản vay</button>
      </div>

      {loans.length > 0 && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
          {[
            {l:"Đang vay",        v:activeLoans.length+"",  unit:"khoản", c:"#f87171"},
            {l:"Tổng dư nợ",      v:fVND(totalRemaining),   unit:"",      c:"#f87171"},
            {l:"Trả hàng tháng",  v:fVND(totalMonthly),     unit:"",      c:"#fbbf24"},
          ].map(({l,v,unit,c}) => (
            <div key={l} style={{background:"#1e293b",borderRadius:10,padding:"12px 16px",borderTop:`3px solid ${c}`}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:4}}>{l}</div>
              <div style={{fontWeight:700,fontSize:16,color:c}}>{v} <span style={{fontSize:11}}>{unit}</span></div>
            </div>
          ))}
        </div>
      )}

      {loans.length === 0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:"#475569"}}>
          <div style={{fontSize:40,marginBottom:12}}>🏦</div>
          <div style={{fontSize:14,marginBottom:6}}>Chưa có khoản vay nào</div>
          <div style={{fontSize:12}}>Theo dõi vay tiêu dùng, vay mua nhà, mua xe...</div>
        </div>
      ) : (
        <div>
          {unpaidLoans.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:12}}>📋 Chưa thanh toán ({unpaidLoans.length})</div>
              <div style={{display:"grid",gap:14}}>
                {unpaidLoans.map(loan => renderLoanCard(loan, false))}
              </div>
            </div>
          )}
          {paidThisMonth.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#4ade80",marginBottom:12}}>✅ Đã thanh toán kỳ này ({paidThisMonth.length})</div>
              <div style={{display:"grid",gap:8}}>
                {paidThisMonth.map(loan => renderLoanCard(loan, true))}
              </div>
            </div>
          )}
          {completedLoans.length > 0 && (
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#64748b",marginBottom:12}}>🎉 Đã trả xong ({completedLoans.length})</div>
              <div style={{display:"grid",gap:8}}>
                {completedLoans.map(loan => {
                  const t = getType(loan.loai);
                  return (
                    <div key={loan.id} style={{background:"#1e293b",borderRadius:10,padding:"12px 16px",borderLeft:"4px solid #334155",opacity:0.5,display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:12,color:"#4ade80"}}>✓</span>
                      <div style={{flex:1}}>
                        <span style={{fontSize:13,color:"#64748b",fontWeight:600}}>{loan.ten}</span>
                        <span style={{fontSize:11,color:"#334155",marginLeft:8}}>{t.l} · {fVND(loan.soTienVay)}</span>
                      </div>
                      <button onClick={()=>del(loan.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16}}>×</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3 style={{color:"#f59e0b",marginBottom:16,fontSize:15}}>{editItem?"Sửa khoản vay":"Thêm khoản vay"}</h3>
            <div style={{display:"grid",gap:12}}>
              <div>
                <label style={labelS}>Tên khoản vay *</label>
                <input style={inputS} placeholder="VD: Vay mua nhà VCB" value={form.ten} onChange={e=>setForm({...form,ten:e.target.value})}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <label style={labelS}>Loại vay</label>
                  <select style={inputS} value={form.loai} onChange={e=>setForm({...form,loai:e.target.value})}>
                    {LOAN_TYPES.map(t=><option key={t.id} value={t.id}>{t.l}</option>)}
                  </select>
                </div>
                <div>
                  <label style={labelS}>Ngân hàng / Tổ chức</label>
                  <input style={inputS} placeholder="VD: VCB, FE Credit..." value={form.nganHang} onChange={e=>setForm({...form,nganHang:e.target.value})}/>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <label style={labelS}>Số tiền vay (đ) *</label>
                  <input style={inputS} type="number" placeholder="100000000" value={form.soTienVay} onChange={e=>setForm({...form,soTienVay:e.target.value})}/>
                </div>
                <div>
                  <label style={labelS}>Lãi suất (%/năm)</label>
                  <input style={inputS} type="number" placeholder="8.5" value={form.laiSuat} onChange={e=>setForm({...form,laiSuat:e.target.value})}/>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <div>
                  <label style={labelS}>Số kỳ (tháng) *</label>
                  <input style={inputS} type="number" min="1" placeholder="24" value={form.soKy} onChange={e=>setForm({...form,soKy:e.target.value})}/>
                </div>
                <div>
                  <label style={labelS}>Kỳ đã trả</label>
                  <input style={inputS} type="number" min="0" placeholder="0" value={form.kyDaTra} onChange={e=>setForm({...form,kyDaTra:e.target.value})}/>
                </div>
                <div>
                  <label style={labelS}>Ngày trả (trong tháng)</label>
                  <input style={inputS} type="number" min="1" max="31" placeholder="15" value={form.ngayTraHangThang} onChange={e=>setForm({...form,ngayTraHangThang:e.target.value})}/>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <label style={labelS}>Ngày bắt đầu (DD/MM/YYYY)</label>
                  <input style={inputS} placeholder="VD: 01/01/2024" value={form.ngayBatDau} onChange={e=>setForm({...form,ngayBatDau:e.target.value})}/>
                </div>
                <div>
                  <label style={labelS}>Ghi chú</label>
                  <input style={inputS} placeholder="VD: Cố định 5 năm đầu..." value={form.ghiChu} onChange={e=>setForm({...form,ghiChu:e.target.value})}/>
                </div>
              </div>
              <div>
                <label style={labelS}>Tiền trả hàng tháng (đ) — để trống để tự tính EMI</label>
                <input style={inputS} type="number"
                  placeholder={form.soTienVay&&form.soKy?String(Math.round(calcEMI(parseFloat(form.soTienVay)||0,parseFloat(form.laiSuat)||0,parseInt(form.soKy)||1))):"Tự tính theo EMI"}
                  value={form.soTienTraHangThang}
                  onChange={e=>setForm({...form,soTienTraHangThang:e.target.value})}/>
                {form.soTienVay && form.soKy && !form.soTienTraHangThang && (
                  <div style={{fontSize:10,color:"#475569",marginTop:3}}>Tự tính: {fVND(calcEMI(parseFloat(form.soTienVay)||0,parseFloat(form.laiSuat)||0,parseInt(form.soKy)||1))}/tháng</div>
                )}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={()=>setShowModal(false)} style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#94a3b8",cursor:"pointer"}}>Hủy</button>
              <button onClick={save} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontWeight:700,cursor:"pointer"}}>{editItem?"Lưu":"Thêm"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ── MAIN APP ──────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [prices, setPrices] = useState({});
  const [priceSource, setSource] = useState(null);
  const [logs, setLogs] = useState([]);
  const [lastLog, setLastLog] = useState("Đang khởi động...");
  const [lastUpdated, setUpdated] = useState(null);
  const [mainTab, setMainTab] = useState("alert");
  const [stockSubTab, setStockSubTab] = useState("watchlist");
  const [showLog, setShowLog] = useState(false);
  const [now, setNow] = useState(new Date());
  const [usdvnd, setUsdvnd] = useLS("azfin_usdvnd", 25500);
  const [athMap, setAthMap] = useLS("azfin_ath_v1", {});
  const [athLoading, setAthLoading] = useState(false);
  const [cryptoAth, setCryptoAth] = useLS("azfin_crypto_ath_v1", {});
  const [cryptoPrices, setCryptoPrices] = useState({});
  const [alertSnooze, setAlertSnooze] = useLS("azfin_alert_snooze", {});
  const [activeAlerts, setActiveAlerts] = useState([]);
  const [investedAlerts, setInvestedAlerts] = useLS("azfin_invested_alerts", []);
  const prevAlertsRef = useRef([]);

  useEffect(() => { const t=setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(t); },[]);

  const updateATH = useCallback((pricesData) => {
    setAthMap(prev => {
      const updated = {...prev};
      for (const [code, data] of Object.entries(pricesData)) {
        if (data.lastPrice && (!updated[code] || data.lastPrice > updated[code])) {
          updated[code] = data.lastPrice;
        }
      }
      return updated;
    });
  }, []);

  const loadATH = useCallback(async () => {
    const cacheTime = parseInt(localStorage.getItem('azfin_ath_time') || '0');
    if (Date.now() - cacheTime < 24 * 60 * 60 * 1000 && Object.keys(athMap).length > 50) return;
    setAthLoading(true);
    try {
      const newAth = await fetchHistoricalATH();
      if (Object.keys(newAth).length > 0) {
        setAthMap(prev => {
          const merged = {...prev};
          for (const [code, ath] of Object.entries(newAth)) {
            merged[code] = Math.max(merged[code] || 0, ath);
          }
          return merged;
        });
        localStorage.setItem('azfin_ath_time', String(Date.now()));
      }
    } catch {}
    setAthLoading(false);
  }, [athMap]);

  const load = useCallback(async () => {
    const logArr=[];
    const addLog = msg => { logArr.push(msg); setLastLog(msg); setLogs([...logArr]); };
    const { map, source } = await fetchPrices(ALL_SYMBOLS, addLog);
    if (Object.keys(map).length) { setPrices(map); setSource(source); setUpdated(new Date()); updateATH(map); }
  }, [updateATH]);

  const loadCrypto = useCallback(async () => {
    const { map } = await fetchCryptoPrices();
    if (!Object.keys(map).length) return;
    setCryptoPrices(map);
    setCryptoAth(prev => {
      const updated = {...prev};
      for (const [coin, data] of Object.entries(map)) {
        if (data.ath) { updated[coin] = data.ath; }
        else if (!updated[coin] || data.price > updated[coin]) { updated[coin] = data.price; }
      }
      return updated;
    });
  }, []);

  useEffect(() => { load(); const t=setInterval(load,60000); return ()=>clearInterval(t); },[load]);
  useEffect(() => { loadATH(); }, []);
  useEffect(() => { loadCrypto(); const t=setInterval(loadCrypto,60000); return ()=>clearInterval(t); },[loadCrypto]);

  useEffect(() => {
    if (!Object.keys(prices).length && !Object.keys(cryptoPrices).length) return;
    const allTriggered = computeAlerts(prices, athMap, cryptoAth, cryptoPrices);
    const nowTs = Date.now();
    const nonSnoozed = allTriggered.filter(a => {
      const until = alertSnooze[a.key]; return !until || until < nowTs;
    });
    const prevKeys = new Set(prevAlertsRef.current.map(a => a.key));
    const newOnes = nonSnoozed.filter(a => !prevKeys.has(a.key));
    if (newOnes.length > 0) {
      if ("Notification" in window && Notification.permission === "default")
        Notification.requestPermission();
      newOnes.forEach(a => sendAlertNotif(a));
    }
    prevAlertsRef.current = nonSnoozed;
    setActiveAlerts(nonSnoozed);
  }, [prices, athMap, cryptoAth, cryptoPrices, alertSnooze]);

  const withData = Object.keys(prices).length;
  const ft = d => d.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const fd = d => d.toLocaleDateString("vi-VN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const dotC = priceSource&&withData ? "#4ade80" : lastLog.startsWith("⏳") ? "#fbbf24" : "#f87171";

  const mainTabs = [
    {k:"stock",   l:"📈 Cổ phiếu"},
    {k:"fund",    l:"📊 Quỹ"},
    {k:"crypto",  l:"🪙 Crypto"},
    {k:"dca",     l:"🧮 DCA"},
    {k:"ai",      l:"🤖 AI"},
    {k:"alert",   l:"🔔 Đầu tư"},
    {k:"todo",    l:"📋 Todo"},
    {k:"finance", l:"📊 Tài chính"},
    {k:"card",    l:"💳 Thẻ"},
    {k:"expense", l:"💰 Chi tiêu"},
    {k:"loan",    l:"🏦 Khoản vay"},
  ];

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"12px 20px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:15,color:"#fff"}}>Az</div>
          <div>
            <div style={{fontWeight:700,fontSize:17,color:"#fff",letterSpacing:1}}>AzFin Dashboard</div>
            <div style={{fontSize:10,color:"#475569"}}>TÍCH SẢN STOCK & CRYPTO • 05/2026</div>
          </div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap"}}>
          {mainTabs.map(({k,l}) => (
            <button key={k} onClick={()=>setMainTab(k)}
              style={{...btnS(mainTab===k), position:"relative"}}>
              {l}
              {k==="alert" && activeAlerts.length > 0 && (
                <span style={{
                  position:"absolute", top:-4, right:-4,
                  background:"#ef4444", color:"#fff", borderRadius:"50%",
                  width:16, height:16, fontSize:9, fontWeight:700,
                  display:"flex", alignItems:"center", justifyContent:"center"
                }}>
                  {activeAlerts.length > 99 ? "99+" : activeAlerts.length}
                </span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Status bar */}
      <div style={{background:"#0f172a",padding:"8px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #1e293b",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#64748b"}}>{fd(now)}</span>
        <span style={{fontSize:15,fontWeight:700,color:"#38bdf8",fontVariantNumeric:"tabular-nums"}}>{ft(now)}</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:dotC,boxShadow:`0 0 6px ${dotC}`}}/>
          <span style={{fontSize:11,color:"#64748b",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lastLog}</span>
          {lastUpdated && <span style={{fontSize:10,color:"#334155"}}>• {ft(lastUpdated)}</span>}
        </div>
        <button onClick={load} style={{padding:"3px 10px",borderRadius:6,border:"none",background:"#1e293b",color:"#64748b",cursor:"pointer",fontSize:11}}>↺ Làm mới</button>
        <button onClick={()=>setShowLog(v=>!v)} style={{padding:"3px 10px",borderRadius:6,border:"none",background:"#1e293b",color:"#64748b",cursor:"pointer",fontSize:11}}>🔍 Log</button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#475569"}}>USD/VND:</span>
          <input type="number" value={usdvnd} onChange={e=>setUsdvnd(parseInt(e.target.value)||25500)}
            style={{width:80,padding:"3px 8px",borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:11,outline:"none"}}/>
        </div>
      </div>

      {/* Log panel */}
      {showLog && (
        <div style={{background:"#0d1117",padding:"10px 20px",borderBottom:"1px solid #1e293b",fontSize:11,fontFamily:"monospace"}}>
          <b style={{color:"#38bdf8"}}>📡 Connection log:</b>
          <div style={{marginTop:4,color:"#64748b"}}>{logs.map((l,i)=><div key={i}>{l}</div>)}</div>
          {priceSource && <div style={{marginTop:4,color:"#4ade80"}}>✅ Đang dùng: <b>{priceSource}</b></div>}
        </div>
      )}

      <div style={{padding:"16px 20px"}}>
        {/* ── STOCK TAB ── */}
        {mainTab==="stock" && (
          <div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <button onClick={()=>setStockSubTab("watchlist")} style={tabS(stockSubTab==="watchlist","#38bdf8")}>📋 Watchlist AzFin</button>
              <button onClick={()=>setStockSubTab("portfolio")} style={tabS(stockSubTab==="portfolio","#4ade80")}>💼 Danh mục của tôi</button>
            </div>
            {stockSubTab==="watchlist" && <StockWatchlist prices={prices} priceSource={priceSource} athMap={athMap} athLoading={athLoading}/>}
            {stockSubTab==="portfolio" && <StockPortfolio prices={prices}/>}
          </div>
        )}

        {/* ── FUND TAB ── */}
        {mainTab==="fund" && <FundSection prices={prices} athMap={athMap} athLoading={athLoading}/>}

        {/* ── CRYPTO TAB ── */}
        {mainTab==="crypto" && <CryptoSection usdvnd={usdvnd} cryptoPrices={cryptoPrices} setCryptoPrices={setCryptoPrices} cryptoAth={cryptoAth} setCryptoAth={setCryptoAth}/>}

        {/* ── DCA TAB ── */}
        {mainTab==="dca" && <DcaCalculator/>}

        {/* ── AI TAB ── */}
        {mainTab==="ai" && <AiSection prices={prices} priceSource={priceSource} now={now}/>}

        {/* ── ALERT TAB ── */}
        {mainTab==="alert" && <AlertTab activeAlerts={activeAlerts} alertSnooze={alertSnooze} setAlertSnooze={setAlertSnooze} investedAlerts={investedAlerts} setInvestedAlerts={setInvestedAlerts}/>}
        {mainTab==="todo" && <TodoTab/>}

        {/* ── FINANCE TAB ── */}
        {mainTab==="finance" && <FinanceTab prices={prices} cryptoPrices={cryptoPrices} usdvnd={usdvnd}/>}

        {/* ── CREDIT CARD TAB ── */}
        {mainTab==="card" && <CreditCardTab/>}

        {/* ── EXPENSE TAB ── */}
        {mainTab==="expense" && <ExpenseTab/>}

        {/* ── LOAN TAB ── */}
        {mainTab==="loan" && <LoanTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
